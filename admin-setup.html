<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Setup - Hunny Collection PK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        h1 { color: #667eea; margin-bottom: 20px; }
        .status { padding: 15px; border-radius: 8px; margin: 15px 0; }
        .success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .info { background: #d1ecf1; color: #0c5460; border-left: 4px solid #0c5460; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        pre { background: #f5f5f5; padding: 15px; border-radius: 8px; overflow-x: auto; }
        code { font-family: monospace; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 Admin Setup Tool</h1>
        <p style="color: #666; margin-bottom: 20px;">This tool will automatically setup your admin account in Firestore</p>
        
        <div id="status-container"></div>
        
        <button id="setup-btn" onclick="setupAdmin()" style="width: 100%; font-size: 1.2rem;">
            🚀 Setup My Admin Account
        </button>
        
        <p style="text-align: center; margin-top: 20px; color: #999; font-size: 0.9rem;">
            After setup, you can access <a href="admin.html">admin.html</a>
        </p>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signInWithEmailAndPassword, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const statusContainer = document.getElementById('status-container');
        const setupBtn = document.getElementById('setup-btn');

        function showStatus(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.innerHTML = message;
            statusContainer.appendChild(div);
        }

        window.setupAdmin = async function() {
            setupBtn.disabled = true;
            setupBtn.textContent = '⏳ Setting up...';

            try {
                showStatus('🔑 Checking authentication...');
                
                let user = auth.currentUser;
                
                if (!user) {
                    showStatus('👤 No user logged in. Please login to admin.html first, then come back here.', 'error');
                    setupBtn.disabled = false;
                    setupBtn.textContent = '🚀 Setup My Admin Account';
                    return;
                }

                showStatus(`✅ Authenticated as: ${user.email}`);
                showStatus(`🔑 Your UID: <code>${user.uid}</code>`);

                // Check if already admin
                showStatus('🔍 Checking if admin already exists...');
                const adminDoc = await getDoc(doc(db, 'admins', user.uid));
                
                if (adminDoc.exists()) {
                    showStatus('✅ Admin account already exists! You can use admin.html now.', 'success');
                    showStatus('<a href="admin.html" style="color: #667eea; font-weight: bold;">Go to Admin Panel →</a>', 'success');
                    return;
                }

                // Create admin document
                showStatus('🆕 Creating admin account...');
                
                await setDoc(doc(db, 'admins', user.uid), {
                    email: user.email,
                    uid: user.uid,
                    role: 'super-admin',
                    createdAt: new Date().toISOString(),
                    setupTool: true
                });

                showStatus('✅ Admin account created successfully!', 'success');
                showStatus(`
                    <strong>Setup Complete!</strong><br>
                    Collection: <code>admins</code><br>
                    Document ID: <code>${user.uid}</code><br>
                    Email: <code>${user.email}</code>
                `, 'success');
                
                showStatus('<a href="admin.html" style="color: #667eea; font-weight: bold;">🚀 Go to Admin Panel →</a>', 'success');

            } catch (error) {
                console.error('Setup error:', error);
                showStatus(`❌ Error: ${error.message}`, 'error');
                
                if (error.code === 'permission-denied') {
                    showStatus(`
                        <strong>Permission Denied!</strong><br>
                        Please deploy Firestore rules first:<br>
                        <pre>firebase deploy --only firestore:rules</pre>
                        Or manually copy rules from firestore.rules to Firebase Console
                    `, 'error');
                }
                
                setupBtn.disabled = false;
                setupBtn.textContent = '🔄 Try Again';
            }
        };

        // Check auth on load
        onAuthStateChanged(auth, (user) => {
            if (user) {
                showStatus(`✅ Logged in as: <strong>${user.email}</strong>`, 'success');
            } else {
                showStatus(`
                    ⚠️ Not logged in!<br><br>
                    <strong>Steps:</strong><br>
                    1. Go to <a href="admin.html" style="color: #667eea;">admin.html</a><br>
                    2. Login with your account<br>
                    3. Come back to this page<br>
                    4. Click "Setup My Admin Account"
                `, 'info');
            }
        });
    </script>
</body>
</html>
