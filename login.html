    <link rel="stylesheet" href="style.css">
    <style>
        .auth-section {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-soft);
            padding: 60px 20px;
            position: relative;
            overflow: hidden;
        }
        .auth-section::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }
        .auth-card {
            background: var(--white);
            padding: 50px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-medium);
            width: 100%;
            max-width: 480px;
            position: relative;
            border: 3px solid var(--border-color);
            animation: slideUp 0.6s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .auth-title {
            text-align: center;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.3rem;
            margin-bottom: 35px;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95rem;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 1rem;
            transition: all 0.3s ease;
            background: var(--off-white);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-pink);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(255, 105, 180, 0.1);
        }
        .auth-links {
            text-align: center;
            margin-top: 25px;
        }
        .auth-links a {
            color: var(--dark-pink);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .auth-links a:hover {
            color: var(--primary-pink);
        }
        .error-message {
            background: linear-gradient(135deg, #fff5f5 0%, #ffe5e5 100%);
            color: #FF4757;
            padding: 14px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            border: 2px solid #FFB6C1;
            font-weight: 500;
        }
        .success-message {
            background: linear-gradient(135deg, #f0fff4 0%, #e0ffe0 100%);
            color: #28a745;
            padding: 14px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            border: 2px solid #B6E5C1;
            font-weight: 500;
        }
        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/jpeg" href="/assets/logo.jpeg" sizes="32x32">
    <link rel="icon" type="image/jpeg" href="/assets/logo.jpeg" sizes="16x16">
    <link rel="icon" type="image/png" href="/assets/logo.jpeg">
    <link rel="shortcut icon" type="image/jpeg" href="/assets/logo.jpeg">
    <link rel="apple-touch-icon" href="/assets/logo.jpeg">
    <link rel="apple-touch-icon-precomposed" href="/assets/logo.jpeg">
    <meta name="msapplication-TileImage" content="/assets/logo.jpeg">
    <meta name="msapplication-TileColor" content="#FF69B4">
    <meta name="theme-color" content="#FF69B4">

    </head>
<body>
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <a href="/index" class="logo">
                    <img src="assets/logo.jpeg" alt="Hunny Collection PK Logo" class="logo-image">
                    <span class="logo-text">🌸 Hunny Collection PK</span>
                </a>
                <div class="hamburger" onclick="toggleMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <ul class="nav-menu">
                    <li><a href="/index">Home</a></li>
                    <li><a href="/shop">Shop</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="auth-section">
        <div class="auth-card">
            <h1 class="auth-title">Welcome Back! 💖</h1>

            <div id="message-container"></div>

            <form id="login-form">
                <div class="form-group">
                    <label>📧 Email Address</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>🔒 Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <button type="submit" id="login-btn" class="btn-primary" style="width: 100%;">✨ Login</button>
            </form>

            <div class="auth-links">
                <p>Don't have an account? <a href="/signup">Sign Up</a></p>
                <p style="margin-top: 15px;"><a href="/index">← Back to Store</a></p>
            </div>
        </div>
    </section>

    <!-- Video Ad Container - Top -->
    <div id="video-ad-container-top"></div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="site-settings.js"></script>
    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const messageContainer = document.getElementById('message-container');

        function showMessage(message, isError = true) {
            messageContainer.innerHTML = `
                <div class="${isError ? 'error-message' : 'success-message'}">
                    ${message}
                </div>
            `;
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // Show loading state
            loginBtn.textContent = 'Logging in...';
            loginBtn.classList.add('btn-loading');
            messageContainer.innerHTML = '';
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                
                showMessage('Login successful! Redirecting...', false);
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
                
            } catch (error) {
                console.error('Login error:', error);
                
                let errorMessage = 'Login failed. Please try again.';
                
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'No account found with this email.';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Incorrect password.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email address.';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Too many failed attempts. Please try again later.';
                } else if (error.message) {
                    errorMessage = error.message.replace('Firebase: ', '');
                }
                
                showMessage(errorMessage);
                
                // Reset button
                loginBtn.textContent = 'Login';
                loginBtn.classList.remove('btn-loading');
            }
        });
    </script>

    <!-- Mobile Menu Toggle -->
    <script>
        function toggleMenu() {
            const navMenu = document.querySelector('.nav-menu');
            const hamburger = document.querySelector('.hamburger');
            navMenu.classList.toggle('active');
            hamburger.classList.toggle('active');
        }

        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelector('.nav-menu').classList.remove('active');
                document.querySelector('.hamburger').classList.remove('active');
            });
        });
    </script>

    <script type="module" src="video-ad.js"></script>

    <!-- Video Ad Container - Bottom -->
    <div id="video-ad-container-bottom"></div>
</body>
</html>
