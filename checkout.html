    <style>
        .checkout-section { padding: 60px 0; }
        .checkout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }
        .checkout-form {
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.2);

            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .order-summary {
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.2);
            height: fit-content;
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .summary-total {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--dark-pink);
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid var(--border-color);
        }
        .payment-info {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .error-message, .success-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .error-message { background: #f8d7da; color: #721c24; }
        .success-message { background: #d4edda; color: #155724; }

            .checkout-grid {

            .form-group {

            }
            
            .summary-total {

    <script type="module" src="firebase-config.js"></script>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, addDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getCartItems } from './app.js';

        // Check if user is logged in
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('name').value = user.displayName || '';
                document.getElementById('email').value = user.email || '';
            }
        });

        // Load order summary
        const cart = getCartItems();
        const itemsContainer = document.getElementById('order-items');

        if (cart.length === 0) {
            window.location.href = 'cart.html';
        } else {
            itemsContainer.innerHTML = cart.map(item => {
                const sellingPrice = item.sellingPrice || item.price || 0;
                return `
                    <div class="order-item">
                        <div>
                            <strong>${item.name}</strong><br>
                            <small>Qty: ${item.quantity}</small>
                        </div>
                        <div>Rs. ${(sellingPrice * item.quantity).toLocaleString()}</div>
                    </div>
                `;
            }).join('');

            const total = cart.reduce((sum, item) => sum + (((item.sellingPrice || item.price) || 0) * item.quantity), 0);
            document.getElementById('order-total').textContent = total.toLocaleString();
        }

        // Handle checkout
        const checkoutForm = document.getElementById('checkout-form');
        const placeOrderBtn = document.getElementById('place-order-btn');
        const messageContainer = document.getElementById('message-container');

        checkoutForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            placeOrderBtn.textContent = 'Placing Order...';
            placeOrderBtn.disabled = true;
            messageContainer.innerHTML = '';

            const orderData = {
                userId: auth.currentUser.uid,
                customerName: document.getElementById('name').value,
                contact: document.getElementById('contact').value,
                email: document.getElementById('email').value,
                address: {
                    fullAddress: document.getElementById('address').value,
                    city: document.getElementById('city').value
                },
                items: cart,
                total: cart.reduce((sum, item) => sum + (((item.sellingPrice || item.price) || 0) * item.quantity), 0),
                shippingCost: 0, // Can be updated by admin
                packagingCost: 10, // Default packaging
                deliveryCost: 250, // Fixed delivery cost
                status: 'pending',
                notes: document.getElementById('notes').value,
                paymentMethod: 'COD',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };

            try {
                await addDoc(collection(db, 'orders'), orderData);
                localStorage.removeItem('cart');
                
                messageContainer.innerHTML = `
                    <div class="success-message">
                        <strong>Order placed successfully!</strong><br>
                        We will contact you soon for confirmation.
                    </div>
                `;
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } catch (error) {
                console.error('Error placing order:', error);
                messageContainer.innerHTML = `
                    <div class="error-message">
                        Failed to place order. Please try again.<br>
                        <small>${error.message}</small>
                    </div>
                `;
                placeOrderBtn.textContent = 'Place Order';
                placeOrderBtn.disabled = false;
            }
        });
    </script>

    <!-- Mobile Menu Toggle -->
    <script>
        function toggleMenu() {
            const navMenu = document.querySelector('.nav-menu');
            const hamburger = document.querySelector('.hamburger');
            navMenu.classList.toggle('active');
            hamburger.classList.toggle('active');
        }

        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelector('.nav-menu').classList.remove('active');
                document.querySelector('.hamburger').classList.remove('active');
            });
        });
    </script>
