    <style>
        .auth-section {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-soft);
            padding: 60px 20px;
            position: relative;
            overflow: hidden;
        }
        .auth-section::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }
        .auth-card {
            background: var(--white);
            padding: 50px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-medium);
            width: 100%;
            max-width: 500px;
            position: relative;
            border: 3px solid var(--border-color);
            animation: slideUp 0.6s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .auth-title {
            text-align: center;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.3rem;
            margin-bottom: 35px;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95rem;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 1rem;
            transition: all 0.3s ease;
            background: var(--off-white);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-pink);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(255, 105, 180, 0.1);
        }
        .auth-links {
            text-align: center;
            margin-top: 25px;
        }
        .auth-links a {
            color: var(--dark-pink);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .auth-links a:hover {
            color: var(--primary-pink);
        }
        .error-message {
            background: linear-gradient(135deg, #fff5f5 0%, #ffe5e5 100%);
            color: #FF4757;
            padding: 14px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            border: 2px solid #FFB6C1;
            font-weight: 500;
            display: none;
        }
        .success-message {
            background: linear-gradient(135deg, #f0fff4 0%, #e0ffe0 100%);
            color: #28a745;
            padding: 14px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            border: 2px solid #B6E5C1;
            font-weight: 500;
            display: none;
        }
    </style>

<body>
    <header class="header">
        <div class="container">
            <nav class="navbar">

            </nav>

    <section class="auth-section">
        <div class="auth-card">
            <h1 class="auth-title">Create Account ✨</h1>

            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>

            <form id="signup-form">
                <div class="form-group">
                    <label>👤 Full Name</label>
                    <input type="text" id="name" required placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label>📧 Email Address</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>📱 Phone Number</label>
                    <input type="tel" id="phone" required placeholder="+92 3XX XXXXXXX">
                </div>
                <div class="form-group">
                    <label>🔒 Password</label>
                    <input type="password" id="password" required placeholder="At least 6 characters">
                </div>
                <div class="form-group">
                    <label>✓ Confirm Password</label>
                    <input type="password" id="confirm-password" required placeholder="Re-enter password">
                </div>
                <button type="submit" id="signup-btn" class="btn-primary" style="width: 100%;">✨ Sign Up</button>
            </form>

            <div class="auth-links">
                <p>Already have an account? <a href="login.html">Login</a></p>
                <p style="margin-top: 15px;"><a href="index.html">← Back to Store</a></p>
            </div>
        </div>
    </section>

    <!-- Video Ad Container - Top -->
    <div id="video-ad-container-top"></div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="site-settings.js"></script>
    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { createUserWithEmailAndPassword, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const signupForm = document.getElementById('signup-form');
        const signupBtn = document.getElementById('signup-btn');
        const errorEl = document.getElementById('error-message');
        const successEl = document.getElementById('success-message');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            // Validation
            if (password !== confirmPassword) {
                errorEl.textContent = 'Passwords do not match!';
                errorEl.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters';
                errorEl.style.display = 'block';
                return;
            }

            // Show loading
            signupBtn.textContent = 'Creating Account...';
            signupBtn.disabled = true;

            try {
                // Create auth account
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                // Update display name
                await updateProfile(userCredential.user, {
                    displayName: name
                });

                // Try to save to Firestore (may fail due to permissions)
                try {
                    await setDoc(doc(db, 'users', userCredential.user.uid), {
                        name: name,
                        email: email,
                        phone: phone,
                        createdAt: new Date().toISOString(),
                        userId: userCredential.user.uid
                    });
                } catch (firestoreError) {
                    console.log('Firestore save failed (this is OK):', firestoreError.message);
                }

                // Success
                successEl.textContent = 'Account created successfully! Redirecting...';
                successEl.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (error) {
                console.error('Signup error:', error);
                let errorMsg = 'Signup failed. Please try again.';
                
                if (error.code === 'auth/email-already-in-use') {
                    errorMsg = 'This email is already registered. Please login instead.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMsg = 'Invalid email address.';
                } else if (error.code === 'auth/weak-password') {
                    errorMsg = 'Password is too weak. Use at least 6 characters.';
                } else if (error.message) {
                    errorMsg = error.message.replace('Firebase: ', '');
                }
                
                errorEl.textContent = errorMsg;
                errorEl.style.display = 'block';
                
                signupBtn.textContent = 'Sign Up';
                signupBtn.disabled = false;
            }
        });
    </script>

    <!-- Mobile Menu Toggle -->
    <script>
        function toggleMenu() {
            const navMenu = document.querySelector('.nav-menu');
            const hamburger = document.querySelector('.hamburger');
            navMenu.classList.toggle('active');
            hamburger.classList.toggle('active');
        }

        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelector('.nav-menu').classList.remove('active');
                document.querySelector('.hamburger').classList.remove('active');
            });
        });
    </script>
